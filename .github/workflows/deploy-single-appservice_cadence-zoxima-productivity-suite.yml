# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Single job: the runner builds the portal + bot and deploys the result straight
# to Azure via the publish profile. There is deliberately NO upload-artifact /
# download-artifact step — that's what consumed GitHub storage. Building here
# uses Actions minutes (a separate, generous quota), not storage.

name: Build and deploy Node.js app to Azure Web App - cadence-zoxima-productivity-suite

on:
  push:
    branches:
      - deploy/single-appservice
  workflow_dispatch:

# Only one deploy to this app at a time — a newer run cancels an in-flight one,
# so two overlapping runs can't both hit OneDeploy and collide with a 409.
concurrency:
  group: deploy-cadence-zoxima
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install and build (portal + bot)
        env:
          # Vite bakes these into the portal bundle at build time. The build runs
          # HERE (on the runner), not on Azure, so they come from GitHub repo
          # secrets — add them under repo Settings → Secrets and variables → Actions.
          VITE_MSAL_CLIENT_ID: ${{ secrets.VITE_MSAL_CLIENT_ID }}
          VITE_MSAL_TENANT_ID: ${{ secrets.VITE_MSAL_TENANT_ID }}
        run: |
          npm install
          npm run build

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cadence-zoxima-productivity-suite'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DA2537DF58D54E85AA22F973A69DE681 }}
